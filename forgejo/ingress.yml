---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgejo
spec:
  ingressClassName: nginx
  rules:
  - host: push.mon.enorme.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: forgejo, port: { name: http } }
  tls:
  # use default certificate
  - hosts:
    - '*.mon.enorme.uk'

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: forgejo
spec:
  parentRefs: [{ name: traefik-gateway, namespace: traefik }]
  hostnames: [push.mon.enorme.uk]
  rules:
    - backendRefs:
       - name: forgejo
         port: 3000
