---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

labels:
  - pairs:
      app.kubernetes.io/part-of: auth
      app.kubernetes.io/managed-by: kustomize
    includeTemplates: true

namespace: auth
resources:
  - namespace.yml
  - lldap
  - authelia
  - kanidm
  - networking.yml

images:
  - name: lldap
    newName: ghcr.io/lldap/lldap
    newTag: 2026-05-05-alpine-rootless
  - name: authelia
    newName: ghcr.io/authelia/authelia
    newTag: 4.39.19
  - name: kanidm
    newName: docker.io/kanidm/server
    newTag: 1.10.4
