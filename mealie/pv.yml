---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mealie-data-pv
spec:
  local:
    path: /mnt/lucastrunk/@apps/@mealie/data
  capacity: { storage: 1G }
  accessModes: [ReadWriteOncePod]
  storageClassName: ''
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: [coruscant]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mealie-data-pvc
spec:
  volumeName: mealie-data-pv
  storageClassName: ''
  accessModes: [ReadWriteOncePod]
  resources: { requests: { storage: 1G } }
