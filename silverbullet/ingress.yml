---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: silverbullet
  annotations:
    nginx.ingress.kubernetes.io/auth-method: 'GET'
    nginx.ingress.kubernetes.io/auth-url: 'http://authelia.auth.svc.cluster.local:9091/api/authz/auth-request'
    nginx.ingress.kubernetes.io/auth-signin: 'https://identifie.mon.enorme.uk?rm=$request_method'
spec:
  ingressClassName: nginx
  rules:
  - host: documente.mon.enorme.uk
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: silverbullet, port: { name: http } }
  tls:
  # use default certificate
  - hosts:
    - '*.mon.enorme.uk'

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: silverbullet
spec:
  parentRefs: [{ name: traefik-gateway, namespace: traefik }]
  hostnames: [documente.mon.enorme.uk]
  rules:
    - backendRefs:
       - name: silverbullet
         port: 3000
